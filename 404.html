<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Nie znaleziono strony - lekcjaw5minut.pl</title>
    
    <!-- Ikona na pasku przeglądarki (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="files/Projekt bez nazwy-2.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --brand-navy: #0f172a;
            --brand-orange: #f59e0b;
            --brand-blue: #3b82f6;
            --brand-indigo: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdfdfd;
            color: #1e293b;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(245, 158, 11, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
        }

        .blob {
            position: absolute;
            width: 600px; height: 600px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            filter: blur(140px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
            transition: transform 0.2s ease-out;
            will-change: transform;
        }

        .logo-text {
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--brand-navy);
        }

        .highlight-orange {
            background: linear-gradient(to right, #f59e0b, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.05;
            position: absolute;
            z-index: -1;
            user-select: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .floating-icon {
            animation: float 6s ease-in-out infinite;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            transition: transform 0.3s ease;
        }
        
        .logo-img:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="grid-overlay"></div>
    <div class="blob" id="cursorBlob"></div>

    <!-- Main Content -->
    <main class="w-full max-w-4xl px-6 py-12 flex flex-col items-center text-center relative">
        <div class="error-code">404</div>

        <!-- Header Logo -->
        <div class="mb-12">
            <a href="https://lekcjaw5minut.pl">
                <img src="https://lekcjaw5minut.pl/files/logo_lekcjaw5min.png" alt="lekcjaw5minut.pl" class="logo-img">
            </a>
        </div>
        
        <!-- Icon -->
        <div class="mb-8 floating-icon text-7xl text-orange-500/80">
            <i class="fas fa-compass"></i>
        </div>

        <h1 class="text-4xl md:text-6xl logo-text mb-6 tracking-tight">
            Hmm. Nie znaleziono <span class="highlight-orange">strony</span>.
        </h1>

        <p class="text-slate-500 text-lg md:text-xl mb-12 max-w-xl leading-relaxed">
            Przepraszamy, ale strona, której szukasz, nie istnieje. Być może wpisałeś błędny adres lub strona została usunięta.
        </p>

        <!-- Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mb-16">
            <a href="https://lekcjaw5minut.pl" class="px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-3">
                <i class="fas fa-home"></i>
                Wróć do strony głównej
            </a>
            <a href="mailto:pomoc@lekcjaw5minut.pl" class="px-10 py-4 bg-white text-slate-900 border border-slate-200 rounded-2xl font-bold hover:bg-slate-50 transition-all flex items-center justify-center gap-3">
                <i class="fas fa-envelope"></i>
                Zgłoś błąd
            </a>
        </div>

        <!-- Footer Logo Text -->
        <div class="logo-text text-xl opacity-30 select-none">
            lekcja<span class="highlight-orange">w5minut</span><span class="text-slate-400">.pl</span>
        </div>
    </main>

    <script>
        const blob = document.getElementById('cursorBlob');
        let currentX = 0;
        let currentY = 0;
        let targetX = 0;
        let targetY = 0;

        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        function animateBlob() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            
            if (blob) {
                blob.style.transform = `translate(${currentX - 300}px, ${currentY - 300}px)`;
            }
            requestAnimationFrame(animateBlob);
        }
        
        animateBlob();
    </script>
</body>
</html>
