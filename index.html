<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lekcjaw5minut.pl | BUDOWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        :root {
            --logo-navy: #1e3a5a;
            --logo-orange: #e69138;
            --brand-blue: #3b82f6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Tło z delikatnym gradientem i wzorem */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f8fafc;
            background-image: radial-gradient(#3b82f615 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--brand-blue);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.1;
            z-index: -1;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(20%, 20%); }
        }

        /* Stylizacja logo na wzór grafiki */
        .logo-container {
            display: inline-flex;
            align-items: center;
            flex-direction: column;
        }

        .logo-text {
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--logo-navy);
        }

        .highlight-orange {
            color: var(--logo-orange);
        }

        .logo-suffix {
            color: #94a3b8; /* Jasny szary dla .pl jak na logo */
            font-weight: 600;
        }

        .fade-in {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <div class="blob"></div>

    <div class="max-w-4xl mx-auto px-6 py-12 text-center">
        
        <!-- Logo inspirowane grafiką -->
        <div class="mb-10 fade-in" style="animation-delay: 0.2s">
            <div class="logo-container">
                <!-- Ikona zastępcza nawiązująca do klepsydry/książki -->
                <div class="mb-4 text-5xl text-blue-900/20">
                    <i class="fas fa-hourglass-half"></i>
                </div>
                <h1 class="text-5xl md:text-7xl logo-text">
                    lekcja<br class="md:hidden">
                    <span class="highlight-orange">w5minut</span><span class="logo-suffix">.pl</span>
                </h1>
            </div>
        </div>

        <h2 class="text-2xl md:text-4xl font-semibold text-slate-800 mb-6 fade-in" style="animation-delay: 0.4s">
            Najszybsza droga dla nauczycieli.
        </h2>

        <p class="text-slate-600 text-lg md:text-xl mb-12 max-w-2xl mx-auto leading-relaxed fade-in" style="animation-delay: 0.6s">
            Tworzymy platformę, gdzie każdą skomplikowaną lekcję zrobimy za Ciebie! 
            Skup się na uczniach, my zajmiemy się resztą.
        </p>

        <!-- Newsletter / Przycisk -->
        <div class="fade-in" style="animation-delay: 0.8s">
            <a href="mailto:bok@lekcjaw5minut.pl" class="inline-block bg-[#1e3a5a] text-white font-bold py-4 px-10 rounded-full hover:bg-[#e69138] transition-all transform hover:scale-105 shadow-lg">
                Skontaktuj się z nami
            </a>
        </div>

    </div>

    <script>
        // Interakcja z tłem
        document.addEventListener('mousemove', (e) => {
            const blob = document.querySelector('.blob');
            const x = e.clientX;
            const y = e.clientY;
            
            blob.style.transition = 'transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
            blob.style.left = (x - 250) + 'px';
            blob.style.top = (y - 250) + 'px';
        });
    </script>
</body>
</html>
